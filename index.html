<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Pool Game — Interactive Graphics Project</title>

  <!--
    Three.js r128, vendored locally at ./libs/three.module.js so the project
    is fully self-contained (no CDN dependency, works offline / from any
    static host including GitHub Pages serving the repo root).
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "./libs/three.module.js",
      "three/addons/loaders/GLTFLoader.js": "./libs/GLTFLoader.js"
    }
  }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');

    /* --- Reset --- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #111;
      font-family: 'Nunito', 'Segoe UI', Arial, sans-serif;
      color: #eee;
    }

    /* --- WebGL canvas: full-viewport --- */
    #glCanvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      cursor: crosshair;
    }

    /* ── HUD panel — top-left ── */
    #hud {
      position: fixed;
      top: 14px; left: 14px;
      background: rgba(0, 0, 0, 0.70);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(245, 215, 110, 0.25);
      border-radius: 14px;
      padding: 14px 22px;
      pointer-events: none;
      user-select: none;
      line-height: 1.5;
      box-shadow: 0 0 20px rgba(245, 215, 110, 0.10), 0 4px 16px rgba(0,0,0,0.5);
    }
    #hud-level {
      font-size: 23px;
      font-weight: 900;
      color: #f5d76e;
      text-shadow: 0 0 14px rgba(245, 215, 110, 0.8), 0 0 30px rgba(245, 215, 110, 0.3);
      letter-spacing: 0.5px;
    }
    #hud-balls { font-size: 16px; font-weight: 600; color: #ccc; margin-top: 3px; }



    /* ── Overlay keyframes ── */
    @keyframes bounceIn {
      0%   { transform: scale(0.15) translateY(60px); opacity: 0; }
      55%  { transform: scale(1.10) translateY(-10px); opacity: 1; }
      75%  { transform: scale(0.95) translateY(3px); }
      100% { transform: scale(1)    translateY(0); }
    }
    @keyframes spinBall {
      to { transform: rotate(360deg); }
    }
    @keyframes floatTrophy {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-12px) scale(1.05); }
    }
    @keyframes pulseGlow {
      0%, 100% { text-shadow: 0 0 14px currentColor, 0 0 28px currentColor; }
      50%       { text-shadow: 0 0 28px currentColor, 0 0 56px currentColor, 0 0 90px currentColor; }
    }
    @keyframes starPop {
      0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
      70%  { transform: scale(1.35) rotate(8deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg);    opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    @keyframes levelMsgSlide {
      0%   { transform: translateY(14px); opacity: 0; }
      100% { transform: translateY(0);    opacity: 1; }
    }

    /* ── Overlay (level complete / win) ── */
    #overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(8px);
      z-index: 100;
      overflow: hidden;
    }
    .overlay-card {
      position: relative;
      z-index: 1;
      background: rgba(8, 8, 18, 0.96);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 22px;
      padding: 44px 68px;
      text-align: center;
      animation: bounceIn 0.52s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      box-shadow: 0 0 70px rgba(0,0,0,0.9), 0 0 40px rgba(245,215,110,0.07);
    }
    .overlay-emoji {
      font-size: 58px;
      line-height: 1;
      display: block;
      margin-bottom: 14px;
    }
    .overlay-emoji.spin  { animation: spinBall    1.1s linear infinite; }
    .overlay-emoji.float { animation: floatTrophy 1.6s ease-in-out infinite; }
    .overlay-card h2 {
      font-size: 32px;
      font-weight: 900;
      color: #f5d76e;
      margin-bottom: 10px;
      text-shadow: 0 0 18px rgba(245,215,110,0.65);
      letter-spacing: 0.5px;
    }
    .overlay-card h1 {
      font-size: 48px;
      font-weight: 900;
      color: #6effa0;
      margin-bottom: 14px;
      letter-spacing: 3px;
      animation: pulseGlow 1.3s ease-in-out infinite;
    }
    .overlay-stars {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 14px;
    }
    .overlay-stars span {
      font-size: 28px;
      display: inline-block;
      animation: starPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .overlay-stars span:nth-child(1) { animation-delay: 0.10s; }
    .overlay-stars span:nth-child(2) { animation-delay: 0.22s; }
    .overlay-stars span:nth-child(3) { animation-delay: 0.34s; }
    .overlay-stars span:nth-child(4) { animation-delay: 0.46s; }
    .overlay-card p {
      color: #ccc;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .overlay-quip {
      font-size: 21px !important;
      color: #eee !important;
      margin-bottom: 16px !important;
      animation: levelMsgSlide 0.4s 0.25s ease both;
    }
    .overlay-sub {
      font-size: 14px !important;
      color: #666 !important;
      margin-bottom: 0 !important;
      letter-spacing: 0.5px;
    }
    .overlay-sub-win {
      font-size: 15px !important;
      color: #888 !important;
      font-style: italic;
      margin-bottom: 22px !important;
    }
    .overlay-card button, #btn-restart {
      background: linear-gradient(135deg, #2a6e3f, #3aaa60);
      color: #fff;
      border: 1px solid rgba(110, 255, 160, 0.45);
      border-radius: 12px;
      padding: 14px 38px;
      font-size: 18px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.15s ease;
      box-shadow: 0 0 22px rgba(60, 200, 100, 0.35);
    }
    .overlay-card button:hover, #btn-restart:hover {
      background: linear-gradient(135deg, #3a8e55, #4dcf78);
      box-shadow: 0 0 36px rgba(60, 200, 100, 0.60);
      transform: scale(1.07);
    }
    .confetti-piece {
      position: absolute;
      top: -20px;
      pointer-events: none;
      animation: confettiFall linear forwards;
    }

    /* ── Bottom UI — power bar + button bar stacked ── */
    #bottom-ui {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    @keyframes tremble {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(var(--tremble)); }
      40%  { transform: translateX(calc(var(--tremble) * -1)); }
      60%  { transform: translateX(calc(var(--tremble) * 0.6)); }
      80%  { transform: translateX(calc(var(--tremble) * -0.6)); }
      100% { transform: translateX(0); }
    }

    /* Power bar — styled like a button, glows with the fill color (set via JS) */
    #power-bar-wrap {
      --tremble: 0px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
      color: #eee;
      width: 460px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 12px;
      padding: 10px 18px;
      animation: tremble 0.12s linear infinite;
    }
    #power-bar {
      flex: 1;
      height: 14px;
      background: rgba(255, 255, 255, 0.10);
      border-radius: 7px;
      overflow: hidden;
    }
    #power-fill {
      height: 100%;
      width: 0%;
      background: hsl(120, 90%, 50%);
      border-radius: 7px;
      transition: box-shadow 0.1s;
    }

    /* ── Button bar ── */
    #button-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #button-bar button {
      background: rgba(0, 0, 0, 0.65);
      color: #eee;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 12px;
      padding: 12px 22px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.15s ease;
      letter-spacing: 0.3px;
    }

    /* Each button gets its own accent color on hover */
    #btn-newconfig:hover {
      background: rgba(0, 210, 200, 0.18);
      border-color: rgba(0, 210, 200, 0.70);
      box-shadow: 0 0 16px rgba(0, 210, 200, 0.45);
      transform: scale(1.06);
    }
    #btn-reset:hover {
      background: rgba(255, 165, 50, 0.18);
      border-color: rgba(255, 165, 50, 0.70);
      box-shadow: 0 0 16px rgba(255, 165, 50, 0.45);
      transform: scale(1.06);
    }
    #btn-cam:hover {
      background: rgba(120, 140, 255, 0.18);
      border-color: rgba(120, 140, 255, 0.70);
      box-shadow: 0 0 16px rgba(120, 140, 255, 0.45);
      transform: scale(1.06);
    }
    #btn-lamp:hover {
      background: rgba(255, 215, 60, 0.18);
      border-color: rgba(255, 215, 60, 0.70);
      box-shadow: 0 0 16px rgba(255, 215, 60, 0.45);
      transform: scale(1.06);
    }

    /* --- Controls legend — bottom-right --- */
    #legend {
      position: fixed;
      bottom: 14px;
      right: 14px;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 12px;
      padding: 12px 18px;
      backdrop-filter: blur(4px);
      pointer-events: none;
      user-select: none;
      font-size: 13px;
      font-weight: 600;
      color: #bbb;
    }
    #legend b {
      font-size: 13px;
      font-weight: 800;
      color: #eee;
      display: block;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    #legend-grid {
      display: grid;
      grid-template-columns: auto auto;
      gap: 5px 24px;
    }
    #legend-grid span { white-space: nowrap; }
    #legend kbd {
      display: inline-block;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 5px;
      padding: 1px 7px;
      font-size: 11px;
      font-family: inherit;
      font-weight: 700;
      color: #eee;
      margin-right: 2px;
    }

    /* ── Initial loading overlay ──
       Dismissed exclusively by main.js, once THREE.DefaultLoadingManager
       confirms every texture/model load has finished AND a frame has
       rendered showing the result — see _dismissLoader() in source/main.js.
       No CSS-driven auto-dismiss timer: a fixed-duration animation would hide
       this overlay on a schedule unrelated to real load time. */
    #loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(8px);
      z-index: 200;
      opacity: 1;
      transition: opacity 0.6s ease;
    }
    #loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

  </style>
</head>

<body>
  <!-- Full-viewport WebGL canvas -->
  <canvas id="glCanvas"></canvas>

  <!-- Initial loading overlay — visible immediately, dismissed by main.js after first render -->
  <div id="loading-overlay">
    <div class="overlay-card">
      <span class="overlay-emoji spin">🎱</span>
      <h2>Loading scene&hellip;</h2>
      <p class="overlay-sub">Setting up your table&hellip;</p>
    </div>
  </div>

  <!-- HUD — top-left: level + balls remaining -->
  <div id="hud">
    <div id="hud-level">Level 1 / 4</div>
    <div id="hud-balls">Balls remaining: 1</div>
  </div>

  <!-- Level-complete / win overlay -->
  <div id="overlay" style="display:none"></div>

  <!-- Bottom-center UI: power bar above button row -->
  <div id="bottom-ui">
    <div id="power-bar-wrap">
      <span>Power</span>
      <div id="power-bar">
        <div id="power-fill"></div>
      </div>
    </div>
    <div id="button-bar">
      <button id="btn-newconfig">🎱 New Configuration</button>
      <button id="btn-reset">↺ Reset Game</button>
      <button id="btn-cam">👁 Player POV</button>
      <button id="btn-lamp">🌑 Lamp OFF</button>
    </div>
  </div>

  <!-- Controls legend — bottom-right -->
  <div id="legend">
    <b>Controls</b>
    <div id="legend-grid">
      <span><kbd>drag</kbd> Aim</span>
      <span><kbd>hold</kbd> Charge</span>
      <span><kbd>release</kbd> Shoot</span>
      <span><kbd>scroll</kbd> Zoom (POV)</span>
      <span><kbd>L</kbd> Lamp</span>
      <span><kbd>C / V</kbd> Camera</span>
      <span><kbd>R</kbd> Reset</span>
      <span><kbd>N</kbd> New config</span>
    </div>
  </div>

  <!--
    Main entry point loaded as an ES module.
    All JS files use `import * as THREE from 'three'` resolved via the
    importmap above. Module-relative imports inside main.js (./physics.js,
    ./controls.js, etc.) resolve against this file's own location.
  -->
  <script type="module" src="source/main.js"></script>
</body>
</html>

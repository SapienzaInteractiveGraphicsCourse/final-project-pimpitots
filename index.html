<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Pool Game — Interactive Graphics Project</title>

  <!--
    Three.js r128, vendored locally at ./libs/three.module.js so the project
    is fully self-contained (no CDN dependency, works offline / from any
    static host including GitHub Pages serving the repo root).
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "./libs/three.module.js"
    }
  }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');

    /* --- Reset --- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #111;
      font-family: 'Nunito', 'Segoe UI', Arial, sans-serif;
      color: #eee;
    }

    /* --- WebGL canvas: full-viewport --- */
    #glCanvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      cursor: crosshair;
    }

    /* ── Bottom UI — power bar + button bar stacked ── */
    #bottom-ui {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    @keyframes tremble {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(var(--tremble)); }
      40%  { transform: translateX(calc(var(--tremble) * -1)); }
      60%  { transform: translateX(calc(var(--tremble) * 0.6)); }
      80%  { transform: translateX(calc(var(--tremble) * -0.6)); }
      100% { transform: translateX(0); }
    }

    /* Power bar — styled like a button, glows with the fill color (set via JS) */
    #power-bar-wrap {
      --tremble: 0px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
      color: #eee;
      width: 460px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 12px;
      padding: 10px 18px;
      animation: tremble 0.12s linear infinite;
    }
    #power-bar {
      flex: 1;
      height: 14px;
      background: rgba(255, 255, 255, 0.10);
      border-radius: 7px;
      overflow: hidden;
    }
    #power-fill {
      height: 100%;
      width: 0%;
      background: hsl(120, 90%, 50%);
      border-radius: 7px;
      transition: box-shadow 0.1s;
    }

    /* ── Button bar ── */
    #button-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #button-bar button {
      background: rgba(0, 0, 0, 0.65);
      color: #eee;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 12px;
      padding: 12px 22px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.15s ease;
      letter-spacing: 0.3px;
    }

    /* Each button gets its own accent color on hover */
    #btn-newconfig:hover {
      background: rgba(0, 210, 200, 0.18);
      border-color: rgba(0, 210, 200, 0.70);
      box-shadow: 0 0 16px rgba(0, 210, 200, 0.45);
      transform: scale(1.06);
    }
    #btn-reset:hover {
      background: rgba(255, 165, 50, 0.18);
      border-color: rgba(255, 165, 50, 0.70);
      box-shadow: 0 0 16px rgba(255, 165, 50, 0.45);
      transform: scale(1.06);
    }
    #btn-cam:hover {
      background: rgba(120, 140, 255, 0.18);
      border-color: rgba(120, 140, 255, 0.70);
      box-shadow: 0 0 16px rgba(120, 140, 255, 0.45);
      transform: scale(1.06);
    }
    #btn-lamp:hover {
      background: rgba(255, 215, 60, 0.18);
      border-color: rgba(255, 215, 60, 0.70);
      box-shadow: 0 0 16px rgba(255, 215, 60, 0.45);
      transform: scale(1.06);
    }

    /* --- Controls legend — bottom-right --- */
    #legend {
      position: fixed;
      bottom: 14px;
      right: 14px;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 12px;
      padding: 12px 18px;
      backdrop-filter: blur(4px);
      pointer-events: none;
      user-select: none;
      font-size: 13px;
      font-weight: 600;
      color: #bbb;
    }
    #legend b {
      font-size: 13px;
      font-weight: 800;
      color: #eee;
      display: block;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    #legend-grid {
      display: grid;
      grid-template-columns: auto auto;
      gap: 5px 24px;
    }
    #legend-grid span { white-space: nowrap; }
    #legend kbd {
      display: inline-block;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 5px;
      padding: 1px 7px;
      font-size: 11px;
      font-family: inherit;
      font-weight: 700;
      color: #eee;
      margin-right: 2px;
    }
  </style>
</head>
<body>
  <!-- Full-viewport WebGL canvas -->
  <canvas id="glCanvas"></canvas>

  <!-- Bottom-center UI: power bar above button row -->
  <div id="bottom-ui">
    <div id="power-bar-wrap">
      <span>Power</span>
      <div id="power-bar">
        <div id="power-fill"></div>
      </div>
    </div>
    <div id="button-bar">
      <button id="btn-newconfig">🎱 New Configuration</button>
      <button id="btn-reset">↺ Reset Balls</button>
      <button id="btn-cam">👁 Player POV</button>
      <button id="btn-lamp">🌑 Lamp OFF</button>
    </div>
  </div>

  <!-- Controls legend — bottom-right -->
  <div id="legend">
    <b>Controls</b>
    <div id="legend-grid">
      <span><kbd>drag</kbd> Aim</span>
      <span><kbd>hold</kbd> Charge</span>
      <span><kbd>release</kbd> Shoot</span>
      <span><kbd>scroll</kbd> Zoom (POV)</span>
      <span><kbd>L</kbd> Lamp</span>
      <span><kbd>C / V</kbd> Camera</span>
      <span><kbd>R</kbd> Reset</span>
      <span><kbd>N</kbd> New config</span>
    </div>
  </div>

  <!--
    Main entry point loaded as an ES module.
    All JS files use `import * as THREE from 'three'` resolved via the
    importmap above. Module-relative imports inside main.js (./physics.js,
    ./controls.js, etc.) resolve against this file's own location.
  -->
  <script type="module" src="source/main.js"></script>
</body>
</html>
